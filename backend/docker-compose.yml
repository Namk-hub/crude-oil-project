services:
  db:
    image: postgres:16-alpine
    container_name: india_oil_risk_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: india_oil_risk
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d india_oil_risk"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build: .
    container_name: india_oil_risk_api
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql://postgres:postgres@db:5432/india_oil_risk
      APP_ENV: production
      NEWSAPI_KEY: ${NEWSAPI_KEY:-}
      NEWS_FETCH_ON_STARTUP: "true"
    depends_on:
      db:
        condition: service_healthy

volumes:
  postgres_data:
